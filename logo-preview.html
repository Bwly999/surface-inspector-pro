<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surface Inspector Pro - Current Logo Color Tweaks</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&family=JetBrains+Mono:wght@400;700&display=swap');
        body {
            background-color: #f8fafc;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 20px 20px;
            color: #0f172a;
        }
        .hard-shadow-sm { box-shadow: 2px 2px 0px 0px rgba(0,0,0,1); }
        .logo-card { 
            background: white; 
            border: 2px solid black;
            transition: all 0.2s ease;
        }
        .logo-container {
            width: 96px;
            height: 44px;
            position: relative;
        }
        .mono { font-family: 'JetBrains Mono', monospace; }
    </style>
</head>
<body class="p-12">

    <header class="max-w-6xl mx-auto mb-16 text-center">
        <h1 class="text-5xl font-black tracking-tighter mb-4 uppercase">当前 Logo <span class="text-[#ff4d00]">配色微调</span></h1>
        <p class="text-slate-500 font-bold mono uppercase tracking-widest text-sm italic">Focusing on White & Orange Palette</p>
    </header>

    <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-12">

        <!-- 方案 1: 纯净白橙 (Pure White & Orange) -->
        <div class="logo-card p-10 flex flex-col items-center">
            <div class="logo-container mb-6">
                <div class="absolute inset-0 bg-black rounded transform rotate-1 hard-shadow-sm"></div>
                <div class="absolute inset-0 bg-white border-2 border-black rounded flex items-center justify-center transform -rotate-1 overflow-hidden">
                   <div class="absolute inset-0 opacity-5" style="backgroundImage: radial-gradient(black 1px, transparent 1px); backgroundSize: 4px 4px;"></div>
                   <svg width="100%" height="100%" viewBox="0 0 80 40" fill="none">
                      <defs>
                        <linearGradient id="grad1" x1="0" y1="0" x2="0" y2="1">
                          <stop offset="0%" stop-color="#ff4d00" stop-opacity="0.6" />
                          <stop offset="100%" stop-color="#ff4d00" stop-opacity="0" />
                        </linearGradient>
                      </defs>
                      <path d="M5 30H75" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="2 2"/>
                      <path d="M5 30C15 25 25 35 40 20C55 5 65 25 75 20" stroke="#ff4d00" stroke-width="2.5" stroke-linejoin="round" />
                      <rect x="39" y="5" width="2" height="25" fill="url(#grad1)">
                        <animate attributeName="x" values="5;73;5" dur="4s" repeatCount="indefinite" />
                      </rect>
                      <circle cx="40" cy="20" r="4" stroke="black" stroke-width="1.5">
                        <animate attributeName="cx" values="5;73;5" dur="4s" repeatCount="indefinite" />
                        <animate attributeName="cy" values="30;20;20" dur="4s" repeatCount="indefinite" />
                      </circle>
                   </svg>
                </div>
            </div>
            <h3 class="font-black text-xl mb-2 uppercase tracking-tighter">方案 1: 经典白橙</h3>
            <p class="text-xs text-slate-500 italic">白色底色 + 橙色波形 + 黑色准星，最符合“未来磁带”主页的简洁视觉。</p>
        </div>

        <!-- 方案 2: 反转强调 (Reverse Accent) -->
        <div class="logo-card p-10 flex flex-col items-center">
            <div class="logo-container mb-6">
                <div class="absolute inset-0 bg-black rounded transform rotate-1 hard-shadow-sm"></div>
                <div class="absolute inset-0 bg-white border-2 border-black rounded flex items-center justify-center transform -rotate-1 overflow-hidden">
                   <div class="absolute inset-0 opacity-10" style="backgroundImage: linear-gradient(#ff4d00 0.5px, transparent 0.5px), linear-gradient(90deg, #ff4d00 0.5px, transparent 0.5px); backgroundSize: 6px 6px;"></div>
                   <svg width="100%" height="100%" viewBox="0 0 80 40" fill="none">
                      <defs>
                        <linearGradient id="grad2" x1="0" y1="0" x2="0" y2="1">
                          <stop offset="0%" stop-color="black" stop-opacity="0.4" />
                          <stop offset="100%" stop-color="black" stop-opacity="0" />
                        </linearGradient>
                      </defs>
                      <path d="M5 30H75" stroke="black" stroke-width="0.5" opacity="0.2"/>
                      <path d="M5 30C15 25 25 35 40 20C55 5 65 25 75 20" stroke="black" stroke-width="3" stroke-linejoin="round" />
                      <rect x="39" y="5" width="2" height="25" fill="url(#grad2)">
                        <animate attributeName="x" values="5;73;5" dur="4s" repeatCount="indefinite" />
                      </rect>
                      <circle cx="40" cy="20" r="4" stroke="#ff4d00" stroke-width="2">
                        <animate attributeName="cx" values="5;73;5" dur="4s" repeatCount="indefinite" />
                        <animate attributeName="cy" values="30;20;20" dur="4s" repeatCount="indefinite" />
                      </circle>
                   </svg>
                </div>
            </div>
            <h3 class="font-black text-xl mb-2 uppercase tracking-tighter">方案 2: 黑线橙核</h3>
            <p class="text-xs text-slate-500 italic">黑色粗波形线强调轮廓，橙色准星作为视觉中心闪烁，背景带有淡淡的橙色网格。</p>
        </div>

        <!-- 方案 3: 高亮扫描 (High-Contrast Scan) -->
        <div class="logo-card p-10 flex flex-col items-center">
            <div class="logo-container mb-6">
                <div class="absolute inset-0 bg-[#ff4d00] rounded transform rotate-1 hard-shadow-sm"></div>
                <div class="absolute inset-0 bg-white border-2 border-black rounded flex items-center justify-center transform -rotate-1 overflow-hidden">
                   <svg width="100%" height="100%" viewBox="0 0 80 40" fill="none">
                      <path d="M0 20H80" stroke="#ff4d00" stroke-width="0.5" opacity="0.1"/>
                      <path d="M5 30C15 25 25 35 40 20C55 5 65 25 75 20" stroke="black" stroke-width="2" stroke-dasharray="4 2" />
                      <rect x="39" y="0" width="10" height="40" fill="#ff4d00" opacity="0.2">
                        <animate attributeName="x" values="-10;80;-10" dur="3s" repeatCount="indefinite" />
                      </rect>
                      <path d="M5 30C15 25 25 35 40 20C55 5 65 25 75 20" stroke="#ff4d00" stroke-width="2.5" />
                   </svg>
                </div>
            </div>
            <h3 class="font-black text-xl mb-2 uppercase tracking-tighter">方案 3: 宽幅扫描</h3>
            <p class="text-xs text-slate-500 italic">将激光束改为半透明的橙色宽扫描带，波形在扫描带经过时呈现出橙色与黑色的交替感。</p>
        </div>

        <!-- 方案 4: 极简磁带感 (Minimal Tape) -->
        <div class="logo-card p-10 flex flex-col items-center">
            <div class="logo-container mb-6">
                <div class="absolute inset-0 bg-black rounded transform rotate-1 hard-shadow-sm"></div>
                <div class="absolute inset-0 bg-white border-2 border-black rounded flex items-center justify-center transform -rotate-1 overflow-hidden">
                   <div class="absolute left-0 top-0 w-2 h-full bg-[#ff4d00]"></div>
                   <svg width="100%" height="100%" viewBox="0 0 80 40" fill="none">
                      <path d="M10 20C20 20 25 10 40 10C55 10 60 30 75 30" stroke="black" stroke-width="3" stroke-linecap="round" />
                      <circle cx="40" cy="10" r="3" fill="#ff4d00" />
                      <circle cx="75" cy="30" r="3" fill="#ff4d00" />
                   </svg>
                </div>
            </div>
            <h3 class="font-black text-xl mb-2 uppercase tracking-tighter">方案 4: 边框色带</h3>
            <p class="text-xs text-slate-500 italic">在左侧增加一条橙色色带，内部波形极简化，强调块面感和结构感。</p>
        </div>

    </div>

    <footer class="max-w-6xl mx-auto mt-20 pt-10 border-t-2 border-black flex justify-between items-center">
        <div class="mono text-[10px] font-black text-black uppercase tracking-widest italic">Current SVG Structure with New Color Schemes</div>
        <div class="flex gap-2">
            <div class="w-4 h-4 bg-[#ff4d00] border border-black"></div>
            <div class="w-4 h-4 bg-white border border-black"></div>
            <div class="w-4 h-4 bg-black"></div>
        </div>
    </footer>

</body>
</html>
